<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圖片編輯工具</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --canvas-bg: #0b1220;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100vh;
    }
    .sidebar {
      background: linear-gradient(180deg, #111827 0%, #0b1220 100%);
      border-right: 1px solid var(--line);
      padding: 18px;
      overflow-y: auto;
    }
    .editor {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .toolbar-top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,24,39,.9);
      backdrop-filter: blur(6px);
    }
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: auto;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .canvas-wrap.drag-over {
      outline: 3px dashed rgba(37,99,235,.65);
      outline-offset: -12px;
      box-shadow: inset 0 0 0 9999px rgba(255,255,255,.18);
    }
    .panel {
      background: rgba(31,41,55,.85);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 16px;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 10px;
      color: #fff;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="number"], input[type="text"], input[type="color"], select {
      width: 100%;
      background: #0f172a;
      color: var(--text);
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    input[disabled] {
      opacity: .5;
      cursor: not-allowed;
      background: #111827;
    }
    input[type="file"] { display: none; }
    .btn, .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: #2563eb;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      text-decoration: none;
    }
    .btn:hover, .file-btn:hover { transform: translateY(-1px); }
    .btn.secondary { background: #374151; }
    .btn.green { background: #16a34a; }
    .btn.orange { background: #ea580c; }
    .btn.purple { background: #7c3aed; }
    .btn.red { background: #dc2626; }
    .btn.ghost { background: #334155; }
    .btn.teal { background: #0f766e; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .check input { width: 16px; height: 16px; }
    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      font-size: 13px;
    }
    .meta-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .meta-title { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .stage-shell {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      max-width: 100%;
    }
    .stage {
      position: relative;
      display: inline-block;
      background: #f3f4f6;
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      max-width: 100%;
      transform-origin: center center;
    }
    .canvas-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      width: 100%;
    }
    .sample-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,.92);
      border: 1px solid var(--line);
      color: var(--text);
      min-height: 46px;
    }
    .sample-swatch {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
    }
    .sample-text {
      font-size: 13px;
      color: var(--muted);
      min-width: 98px;
    }
    .fab {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: rgba(234,88,12,.95);
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
      backdrop-filter: blur(6px);
    }
    .fab.secondary { background: rgba(55,65,81,.95); }
    .fab.purple { background: rgba(124,58,237,.95); }
    .fab.red { background: rgba(220,38,38,.95); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-panel {
      width: min(92vw, 980px);
      background: #111827;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,.45);
    }
    .modal-head, .modal-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal-actions {
      border-bottom: 0;
      border-top: 1px solid var(--line);
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .modal-body {
      padding: 16px;
      background: #f3f4f6;
      max-height: 72vh;
      overflow: auto;
    }
    .modal-body img {
      display: block;
      max-width: 100%;
      max-height: 65vh;
      margin: 0 auto;
    }
    .modal-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #0f172a;
    }
    .modal-tools .full { grid-column: 1 / -1; }
    canvas { display: block; max-width: 100%; height: auto; }
    #overlayCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #mainCanvas, #overlayCanvas {
      background: transparent;
    }
    .placeholder {
      max-width: 520px;
      text-align: center;
      color: var(--muted);
      padding: 24px;
      background: rgba(15,23,42,.75);
      border: 1px dashed #475569;
      border-radius: 16px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(56,189,248,.15);
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 700;
    }
    .small {
      font-size: 12px;
      color: var(--muted);
    }
    .color-row {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: center;
    }
    .color-chip {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      border: 1px solid #64748b;
      background: #ffffff;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.12);
    }
    .direction-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .crop-preview-note {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--muted);
      margin-top: -4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>圖片編輯工具</h1>

      <div class="panel stack">
        <label for="uploadInput" class="file-btn">上傳圖片</label>
        <input id="uploadInput" type="file" accept="image/*" />
        <div class="meta">
          <div class="meta-item">
            <div class="meta-title">原始寬度</div>
            <div id="origW">-</div>
          </div>
          <div class="meta-item">
            <div class="meta-title">原始高度</div>
            <div id="origH">-</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Resize</h2>
        <div class="row">
          <div class="field">
            <label for="resizeW">寬</label>
            <input id="resizeW" type="number" min="1" placeholder="輸入寬度" />
          </div>
          <div class="field">
            <label for="resizeH">高</label>
            <input id="resizeH" type="number" min="1" placeholder="輸入高度" />
          </div>
        </div>
        <label class="check">
          <input id="lockRatio" type="checkbox" />
          <span>同等比例</span>
        </label>
        <div class="small" style="margin-top:8px;">勾選後，輸入寬度時會自動回填等比例高度；未勾選時會以補白方式適配，不會把圖片拉變形。</div>
        <div class="stack" style="margin-top:10px;">
          <button class="btn green" id="applyResizeBtn">套用 Resize</button>
        </div>
      </div>

      <div class="panel">
        <h2>背影填色 / 延伸</h2>
        <div class="field">
          <label>背景顏色</label>
          <div class="color-row">
            <button id="colorChip" class="color-chip" type="button" aria-label="選擇背景色"></button>
            <div class="stack" style="gap:8px;">
              <input id="bgColorText" type="text" value="#ffffff" placeholder="#ffffff" />
              <input id="bgColorPicker" type="color" value="#ffffff" />
            </div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="extendAmount">延伸像素</label>
            <input id="extendAmount" type="number" min="0" value="0" />
          </div>
          <div class="field">
            <label for="bgTolerance">去背容差（0-255）</label>
            <input id="bgTolerance" type="number" min="0" max="255" value="40" />
          </div>
        </div>
        <div class="stack">
          <button class="btn ghost" id="fillBgBtn">背景填色</button>
          <div class="direction-grid">
            <button class="btn secondary extend-btn" data-direction="top">延伸上方</button>
            <button class="btn secondary extend-btn" data-direction="bottom">延伸下方</button>
            <button class="btn secondary extend-btn" data-direction="left">延伸左邊</button>
            <button class="btn secondary extend-btn" data-direction="right">延伸右邊</button>
          </div>
          <div class="small">延伸時會先自動吸指定角落 10×10 px 的平均色；你也可以直接手填 # 色碼或改色塊。</div>
        </div>
      </div>

      <div class="panel stack">
        <button class="btn secondary" id="resetBtn">重設成原圖</button>
        <button class="btn" id="downloadBtn">下載圖片</button>
      </div>
    </aside>

    <main class="editor">
      <div class="toolbar-top">
        <div>
          <span class="badge" id="modeBadge">模式：一般</span>
        </div>
        <div class="small">右側為編輯畫版區</div>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="placeholder" id="placeholder">
          <h2 style="margin-top:0;">請先上傳圖片</h2>
          <div>上傳後，圖片會出現在右側編輯區；也可以直接把圖片拖曳到這個編輯區。</div>
        </div>
        <div class="stage-shell" id="stageShell" style="display:none;">
          <div class="stage" id="stage">
            <canvas id="mainCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
          </div>
          <div class="canvas-actions">
            <button class="fab" id="openCropperBtn">裁切圖片</button>
            <button class="fab secondary" id="pickBgBtn">取樣背景</button>
            <div class="sample-status" id="sampleStatus">
              <span class="sample-swatch" id="sampleSwatch"></span>
              <span class="sample-text" id="sampleText">尚未取樣</span>
            </div>
            <button class="fab purple" id="removeBgBtn">執行去背</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="cropModal">
    <div class="modal-panel">
      <div class="modal-head">
        <strong>圖片裁切</strong>
        <button class="btn secondary" id="closeCropperBtn" style="width:auto;">關閉</button>
      </div>
      <div class="modal-tools">
        <div class="field">
          <label for="cropW">裁切寬</label>
          <input id="cropW" type="number" min="1" />
        </div>
        <div class="field">
          <label for="cropH">裁切高</label>
          <input id="cropH" type="number" min="1" />
        </div>
        <label class="check full">
          <input id="cropLockRatio" type="checkbox" checked />
          <span>鎖同等比裁切</span>
        </label>
        <div class="crop-preview-note">預設會沿用左側 Resize 的寬高作為裁切比例；取消勾選後可自由裁切。</div>
      </div>
      <div class="modal-body">
        <img id="cropperImage" alt="裁切預覽" />
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="cancelCropperBtn" style="width:auto;">取消</button>
        <button class="btn orange" id="applyCropperBtn" style="width:auto;">套用裁切</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script>
    const uploadInput = document.getElementById('uploadInput');
    const origW = document.getElementById('origW');
    const origH = document.getElementById('origH');
    const resizeW = document.getElementById('resizeW');
    const resizeH = document.getElementById('resizeH');
    const lockRatio = document.getElementById('lockRatio');
    const applyResizeBtn = document.getElementById('applyResizeBtn');
    const openCropperBtn = document.getElementById('openCropperBtn');
    const cropModal = document.getElementById('cropModal');
    const cropperImage = document.getElementById('cropperImage');
    const closeCropperBtn = document.getElementById('closeCropperBtn');
    const cancelCropperBtn = document.getElementById('cancelCropperBtn');
    const applyCropperBtn = document.getElementById('applyCropperBtn');
    const cropW = document.getElementById('cropW');
    const cropH = document.getElementById('cropH');
    const cropLockRatio = document.getElementById('cropLockRatio');
    const bgTolerance = document.getElementById('bgTolerance');
    const pickBgBtn = document.getElementById('pickBgBtn');
    const removeBgBtn = document.getElementById('removeBgBtn');
    const sampleStatus = document.getElementById('sampleStatus');
    const sampleSwatch = document.getElementById('sampleSwatch');
    const sampleText = document.getElementById('sampleText');
    const bgColorText = document.getElementById('bgColorText');
    const bgColorPicker = document.getElementById('bgColorPicker');
    const colorChip = document.getElementById('colorChip');
    const extendAmountInput = document.getElementById('extendAmount');
    const fillBgBtn = document.getElementById('fillBgBtn');
    const extendButtons = document.querySelectorAll('.extend-btn');
    const resetBtn = document.getElementById('resetBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const placeholder = document.getElementById('placeholder');
    const canvasWrap = document.getElementById('canvasWrap');
    const stage = document.getElementById('stage');
    const stageShell = document.getElementById('stageShell');
    const modeBadge = document.getElementById('modeBadge');

    const mainCanvas = document.getElementById('mainCanvas');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
    const octx = overlayCanvas.getContext('2d');

    let originalDataUrl = null;
    let currentImage = null;
    let currentMode = 'normal';
    let bgSample = null;
    let imageAspect = null;
    let cropper = null;
    let cropRatioAspect = null;
    let stageZoom = 1;

    function setMode(modeText) {
      modeBadge.textContent = '模式：' + modeText;
    }

    function updateStageZoom() {
      stage.style.transform = `scale(${stageZoom})`;
    }

    function resetStageZoom() {
      stageZoom = 1;
      updateStageZoom();
    }


    function normalizeHexColor(value) {
      let v = String(value || '').trim();
      if (!v) return null;
      if (!v.startsWith('#')) v = '#' + v;
      const is3 = /^#[0-9a-fA-F]{3}$/.test(v);
      const is6 = /^#[0-9a-fA-F]{6}$/.test(v);
      if (!is3 && !is6) return null;
      if (is3) {
        v = '#' + v.slice(1).split('').map(ch => ch + ch).join('');
      }
      return v.toLowerCase();
    }

    function setBgColorValue(value) {
      const hex = normalizeHexColor(value);
      if (!hex) return false;
      bgColorText.value = hex;
      bgColorPicker.value = hex;
      colorChip.style.background = hex;
      return true;
    }

    function getBgColorValue() {
      const hex = normalizeHexColor(bgColorText.value) || normalizeHexColor(bgColorPicker.value) || '#ffffff';
      setBgColorValue(hex);
      return hex;
    }

    function hexToRgb(hex) {
      const normalized = normalizeHexColor(hex) || '#ffffff';
      return {
        r: parseInt(normalized.slice(1, 3), 16),
        g: parseInt(normalized.slice(3, 5), 16),
        b: parseInt(normalized.slice(5, 7), 16)
      };
    }

    function updateSampleDisplay(hex, label) {
      const normalized = normalizeHexColor(hex) || '#ffffff';
      sampleSwatch.style.background = normalized;
      sampleText.textContent = label ? `${label} ${normalized}` : normalized;
    }

    function renderImageFromSource(src, keepOriginal = false) {
      const img = new Image();
      img.onload = () => {
        currentImage = img;
        imageAspect = img.width / img.height;
        placeholder.style.display = 'none';
        stageShell.style.display = 'flex';
        mainCanvas.width = img.width;
        mainCanvas.height = img.height;
        overlayCanvas.width = img.width;
        overlayCanvas.height = img.height;
        ctx.clearRect(0, 0, img.width, img.height);
        ctx.drawImage(img, 0, 0, img.width, img.height);
        octx.clearRect(0, 0, img.width, img.height);
        origW.textContent = img.width + ' px';
        origH.textContent = img.height + ' px';
        if (!resizeW.value) resizeW.value = img.width;
        if (!resizeH.value) resizeH.value = img.height;
        handleRatioLockState();
        bgSample = null;
        currentMode = 'normal';
        overlayCanvas.style.pointerEvents = 'none';
        overlayCanvas.style.cursor = 'default';
        setMode('一般');
        resetStageZoom();
        if (keepOriginal) originalDataUrl = src;
        updateSampleDisplay(getBgColorValue(), '目前背景');
      };
      img.src = src;
    }

    function getCanvasDataUrl() {
      return mainCanvas.toDataURL('image/png');
    }

    canvasWrap.addEventListener('wheel', (e) => {
      if (!currentImage || cropModal.classList.contains('open')) return;
      const insideStage = e.target === stage || stage.contains(e.target);
      if (!insideStage) return;
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.12 : -0.12;
      stageZoom = Math.min(5, Math.max(0.2, +(stageZoom + delta).toFixed(2)));
      updateStageZoom();
      setMode(`一般（縮放 ${Math.round(stageZoom * 100)}%）`);
    }, { passive: false });

    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      loadImageFile(file);
    });

    function loadImageFile(file) {
      if (!file || !file.type || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = () => renderImageFromSource(reader.result, true);
      reader.readAsDataURL(file);
    }

    ['dragenter', 'dragover'].forEach((eventName) => {
      canvasWrap.addEventListener(eventName, (e) => {
        e.preventDefault();
        const hasImage = [...(e.dataTransfer?.items || [])].some(item => item.kind === 'file' && item.type.startsWith('image/'));
        if (hasImage) canvasWrap.classList.add('drag-over');
      });
    });

    ['dragleave', 'dragend'].forEach((eventName) => {
      canvasWrap.addEventListener(eventName, (e) => {
        if (eventName === 'dragleave' && canvasWrap.contains(e.relatedTarget)) return;
        canvasWrap.classList.remove('drag-over');
      });
    });

    canvasWrap.addEventListener('drop', (e) => {
      e.preventDefault();
      canvasWrap.classList.remove('drag-over');
      const files = [...(e.dataTransfer?.files || [])];
      const imageFile = files.find(file => file.type && file.type.startsWith('image/'));
      if (imageFile) loadImageFile(imageFile);
    });

    function handleRatioLockState() {
      if (lockRatio.checked) {
        resizeH.disabled = true;
        if (imageAspect && resizeW.value) {
          resizeH.value = Math.round(Number(resizeW.value) / imageAspect);
        }
      } else {
        resizeH.disabled = false;
      }
    }

    lockRatio.addEventListener('change', handleRatioLockState);
    resizeW.addEventListener('input', () => {
      if (lockRatio.checked && imageAspect && resizeW.value) {
        resizeH.value = Math.round(Number(resizeW.value) / imageAspect);
      }
    });

    applyResizeBtn.addEventListener('click', () => {
      if (!currentImage) return alert('請先上傳圖片');
      const w = parseInt(resizeW.value, 10);
      const h = parseInt(resizeH.value, 10);
      if (!w || !h || w < 1 || h < 1) return alert('請輸入正確尺寸');

      const temp = document.createElement('canvas');
      temp.width = w;
      temp.height = h;
      const tctx = temp.getContext('2d');

      const scale = Math.min(w / mainCanvas.width, h / mainCanvas.height);
      const drawW = Math.round(mainCanvas.width * scale);
      const drawH = Math.round(mainCanvas.height * scale);
      const offsetX = Math.round((w - drawW) / 2);
      const offsetY = Math.round((h - drawH) / 2);

      paintAutoExtendedBackground(tctx, w, h, offsetX, offsetY, drawW, drawH);
      tctx.drawImage(mainCanvas, 0, 0, mainCanvas.width, mainCanvas.height, offsetX, offsetY, drawW, drawH);
      renderImageFromSource(temp.toDataURL('image/png'));
    });

    function getResizeTarget() {
      const rw = parseInt(resizeW.value, 10) || mainCanvas.width || 1;
      const rh = parseInt(resizeH.value, 10) || mainCanvas.height || 1;
      return { w: rw, h: rh };
    }

    function refreshCropAspect() {
      if (!cropper) return;
      if (cropLockRatio.checked) {
        const w = parseInt(cropW.value, 10) || 1;
        const h = parseInt(cropH.value, 10) || 1;
        cropRatioAspect = w / h;
        cropH.disabled = true;
        cropper.setAspectRatio(cropRatioAspect);
      } else {
        cropRatioAspect = NaN;
        cropH.disabled = false;
        cropper.setAspectRatio(NaN);
      }
    }

    function openCropperModal() {
      if (!currentImage) return alert('請先上傳圖片');
      const target = getResizeTarget();
      cropW.value = target.w;
      cropH.value = target.h;
      cropLockRatio.checked = true;
      cropH.disabled = true;
      cropperImage.src = getCanvasDataUrl();
      cropModal.classList.add('open');
      cropper?.destroy?.();
      cropper = new Cropper(cropperImage, {
        viewMode: 1,
        autoCropArea: 1,
        movable: true,
        zoomable: true,
        scalable: true,
        responsive: true,
        background: false,
        aspectRatio: target.w / target.h,
      });
      cropRatioAspect = target.w / target.h;
      setMode('裁切中');
    }

    function closeCropperModal() {
      cropper?.destroy?.();
      cropper = null;
      cropModal.classList.remove('open');
      setMode('一般');
    }

    openCropperBtn.addEventListener('click', openCropperModal);

    cropLockRatio.addEventListener('change', refreshCropAspect);
    cropW.addEventListener('input', () => {
      if (cropLockRatio.checked) {
        const baseAspect = (parseInt(resizeW.value, 10) || 1) / (parseInt(resizeH.value, 10) || 1);
        if (baseAspect && isFinite(baseAspect)) {
          cropH.value = Math.max(1, Math.round((parseInt(cropW.value, 10) || 1) / baseAspect));
        }
      }
      refreshCropAspect();
    });

    cropH.addEventListener('input', refreshCropAspect);

    pickBgBtn.addEventListener('click', () => {
      if (!currentImage) return alert('請先上傳圖片');
      currentMode = 'pickbg';
      setMode('點選背景顏色');
      overlayCanvas.style.pointerEvents = 'auto';
      overlayCanvas.style.cursor = 'crosshair';
    });

    function getPointerPos(e) {
      const rect = overlayCanvas.getBoundingClientRect();
      const scaleX = overlayCanvas.width / rect.width;
      const scaleY = overlayCanvas.height / rect.height;
      return {
        x: Math.max(0, Math.min(overlayCanvas.width, (e.clientX - rect.left) * scaleX)),
        y: Math.max(0, Math.min(overlayCanvas.height, (e.clientY - rect.top) * scaleY))
      };
    }

    overlayCanvas.addEventListener('click', (e) => {
      if (!currentImage) return;
      if (currentMode === 'pickbg') {
        const pos = getPointerPos(e);
        const pixel = ctx.getImageData(Math.floor(pos.x), Math.floor(pos.y), 1, 1).data;
        bgSample = { r: pixel[0], g: pixel[1], b: pixel[2] };
        const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');
        setBgColorValue(hex);
        currentMode = 'normal';
        overlayCanvas.style.pointerEvents = 'none';
        overlayCanvas.style.cursor = 'default';
        setMode('一般（已取樣背景色）');
        updateSampleDisplay(hex, '取樣背景');
      }
    });

    function averageRectColor(sx, sy, sw, sh) {
      const data = ctx.getImageData(sx, sy, sw, sh).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3] / 255;
        if (alpha <= 0.02) continue;
        r += data[i] * alpha;
        g += data[i + 1] * alpha;
        b += data[i + 2] * alpha;
        count += alpha;
      }
      const rr = Math.round(r / count || 255);
      const gg = Math.round(g / count || 255);
      const bb = Math.round(b / count || 255);
      return '#' + [rr, gg, bb].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function averageCornerColor(position) {
      const sample = 10;
      const width = mainCanvas.width;
      const height = mainCanvas.height;
      let sx = 0;
      let sy = 0;
      if (position === 'topLeft') { sx = 0; sy = 0; }
      if (position === 'bottomLeft') { sx = 0; sy = Math.max(0, height - sample); }
      if (position === 'topRight') { sx = Math.max(0, width - sample); sy = 0; }
      if (position === 'bottomRight') { sx = Math.max(0, width - sample); sy = Math.max(0, height - sample); }
      const sw = Math.max(1, Math.min(sample, width - sx));
      const sh = Math.max(1, Math.min(sample, height - sy));
      return averageRectColor(sx, sy, sw, sh);
    }

    function setDirectionDefaultColor(direction) {
      if (!currentImage) return '#ffffff';
      const mapping = {
        top: 'topLeft',
        bottom: 'bottomLeft',
        left: 'topLeft',
        right: 'topRight'
      };
      const hex = averageCornerColor(mapping[direction] || 'topLeft');
      setBgColorValue(hex);
      return hex;
    }

    function paintAutoExtendedBackground(tctx, targetW, targetH, offsetX, offsetY, drawW, drawH) {
      const topColor = averageCornerColor('topLeft');
      const bottomColor = averageCornerColor('bottomLeft');
      const leftColor = averageCornerColor('topLeft');
      const rightColor = averageCornerColor('topRight');

      tctx.clearRect(0, 0, targetW, targetH);
      if (offsetY > 0) {
        tctx.fillStyle = topColor;
        tctx.fillRect(0, 0, targetW, offsetY);
      }
      const bottomGap = targetH - (offsetY + drawH);
      if (bottomGap > 0) {
        tctx.fillStyle = bottomColor;
        tctx.fillRect(0, offsetY + drawH, targetW, bottomGap);
      }
      if (offsetX > 0) {
        tctx.fillStyle = leftColor;
        tctx.fillRect(0, offsetY, offsetX, drawH);
      }
      const rightGap = targetW - (offsetX + drawW);
      if (rightGap > 0) {
        tctx.fillStyle = rightColor;
        tctx.fillRect(offsetX + drawW, offsetY, rightGap, drawH);
      }
      if (offsetX > 0 && offsetY > 0) {
        tctx.fillStyle = topColor;
        tctx.fillRect(0, 0, offsetX, offsetY);
      }
      if (rightGap > 0 && offsetY > 0) {
        tctx.fillStyle = topColor;
        tctx.fillRect(offsetX + drawW, 0, rightGap, offsetY);
      }
      if (offsetX > 0 && bottomGap > 0) {
        tctx.fillStyle = bottomColor;
        tctx.fillRect(0, offsetY + drawH, offsetX, bottomGap);
      }
      if (rightGap > 0 && bottomGap > 0) {
        tctx.fillStyle = bottomColor;
        tctx.fillRect(offsetX + drawW, offsetY + drawH, rightGap, bottomGap);
      }
      const preferred = offsetY > 0 ? topColor : (bottomGap > 0 ? bottomColor : (offsetX > 0 ? leftColor : rightColor));
      setBgColorValue(preferred);
      updateSampleDisplay(preferred, '自動延伸');
    }

    closeCropperBtn.addEventListener('click', closeCropperModal);
    cancelCropperBtn.addEventListener('click', closeCropperModal);
    cropModal.addEventListener('click', (e) => {
      if (e.target === cropModal) closeCropperModal();
    });
    applyCropperBtn.addEventListener('click', () => {
      if (!cropper) return;
      const croppedCanvas = cropper.getCroppedCanvas();
      if (!croppedCanvas) return;
      renderImageFromSource(croppedCanvas.toDataURL('image/png'));
      closeCropperModal();
    });

    removeBgBtn.addEventListener('click', () => {
      if (!currentImage) return alert('請先上傳圖片');
      if (!bgSample) return alert('請先按「取樣背景」並在圖片上點選背景顏色');

      const tolerance = Number(bgTolerance.value || 40);
      const imgData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const dr = data[i] - bgSample.r;
        const dg = data[i + 1] - bgSample.g;
        const db = data[i + 2] - bgSample.b;
        const dist = Math.sqrt(dr * dr + dg * dg + db * db);
        if (dist <= tolerance) data[i + 3] = 0;
      }
      ctx.putImageData(imgData, 0, 0);
      const preview = new Image();
      preview.onload = () => { currentImage = preview; };
      preview.src = getCanvasDataUrl();
      setMode('一般（已完成去背）');
    });

    fillBgBtn.addEventListener('click', () => {
      if (!currentImage) return alert('請先上傳圖片');
      const color = getBgColorValue();
      const temp = document.createElement('canvas');
      temp.width = mainCanvas.width;
      temp.height = mainCanvas.height;
      const tctx = temp.getContext('2d');
      tctx.fillStyle = color;
      tctx.fillRect(0, 0, temp.width, temp.height);
      tctx.drawImage(mainCanvas, 0, 0);
      renderImageFromSource(temp.toDataURL('image/png'));
    });

    extendButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        if (!currentImage) return alert('請先上傳圖片');
        const direction = btn.dataset.direction;
        const amount = Number(extendAmountInput.value || 0);
        if (amount < 0) return alert('延伸尺寸不可小於 0');
        setDirectionDefaultColor(direction);
        const color = getBgColorValue();
        updateSampleDisplay(color, '延伸背景');
        const temp = document.createElement('canvas');
        let newW = mainCanvas.width;
        let newH = mainCanvas.height;
        let offsetX = 0;
        let offsetY = 0;

        if (direction === 'top' || direction === 'bottom') newH += amount;
        if (direction === 'left' || direction === 'right') newW += amount;
        if (direction === 'top') offsetY = amount;
        if (direction === 'left') offsetX = amount;

        temp.width = newW;
        temp.height = newH;
        const tctx = temp.getContext('2d');
        tctx.fillStyle = color;
        tctx.fillRect(0, 0, newW, newH);
        tctx.drawImage(mainCanvas, offsetX, offsetY);
        renderImageFromSource(temp.toDataURL('image/png'));
      });
    });

    resetBtn.addEventListener('click', () => {
      if (!originalDataUrl) return alert('目前沒有可重設的原圖');
      renderImageFromSource(originalDataUrl);
    });

    bgColorPicker.addEventListener('input', () => {
      if (setBgColorValue(bgColorPicker.value)) updateSampleDisplay(bgColorPicker.value, '手動背景');
    });

    bgColorText.addEventListener('change', () => {
      const ok = setBgColorValue(bgColorText.value);
      if (ok) updateSampleDisplay(bgColorText.value, '手動背景');
    });

    colorChip.addEventListener('click', () => bgColorPicker.click());

    downloadBtn.addEventListener('click', () => {
      if (!currentImage) return alert('請先上傳圖片');
      const a = document.createElement('a');
      a.href = getCanvasDataUrl();
      a.download = 'edited-image.png';
      a.click();
    });

    overlayCanvas.style.pointerEvents = 'none';
    overlayCanvas.style.cursor = 'default';
    setBgColorValue('#ffffff');
    updateSampleDisplay('#ffffff', '目前背景');
    updateStageZoom();
  </script>
</body>
</html>
